<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 - Not Found</title>
<link rel="stylesheet" href="{{prefix}}/static/fonts/fonts.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d1117;
--card:#161b27;
--text:#c9d8e8;
--text2:#8ba3bc;
--accent:#00e5a0;
--danger:#ef4444;
--border:#1e2d3d;
--radius:10px;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.error-container{text-align:center;padding:40px;max-width:600px;position:relative;z-index:10}
.error-code{font-size:10em;font-weight:800;color:var(--accent);line-height:1;margin-bottom:20px;text-shadow:0 0 40px rgba(0,229,160,0.3);animation:glitch 2s infinite}
.error-title{font-size:2.2em;font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:-0.5px}
.error-message{font-size:1.1em;color:var(--text2);margin-bottom:40px;line-height:1.6}
.error-actions{display:flex;gap:16px;justify-content:center}
.btn{padding:14px 28px;border-radius:var(--radius);border:none;font-size:0.95em;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.3s;text-decoration:none;display:inline-block}
.btn-accent{background:var(--accent);color:#0d1117}
.btn-accent:hover{background:#00cc8e;box-shadow:0 8px 20px rgba(0,229,160,0.3)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.status-indicator{position:absolute;top:40px;right:40px;display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);box-shadow:0 0 10px var(--danger);animation:pulse 2s infinite}
.status-text{font-size:0.85em;font-weight:700;color:var(--danger)}
.bg-circuit{position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.03;pointer-events:none;background-image:radial-gradient(circle at 2px 2px,var(--accent) 1px,transparent 0);background-size:40px 40px}
@keyframes glitch{0%,100%{text-shadow:0 0 40px rgba(0,229,160,0.3)}50%{text-shadow:2px 2px 0 rgba(239,68,68,0.3),-2px -2px 0 rgba(0,229,160,0.3)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>
</head>
<body>
<div class="bg-circuit"></div>
<div class="status-indicator">
<span class="status-dot"></span>
<span class="status-text">Error</span>
</div>
<div class="error-container">
<div class="error-code">404</div>
<h1 class="error-title">Page Not Found</h1>
<p class="error-message">The page you're looking for doesn't exist or has been moved. Check the URL or head back to the panel.</p>
<div class="error-actions">
<a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
<a href="/" class="btn btn-accent">Return Home</a>
</div>
</div>
</body>
</html>
